  <textarea id="manualSource" hidden># AI漫剧 Skill 用户推进手册

本手册给用户使用：当你想让 `$ai-comic-drama` 推进项目时，直接复制对应提示词，把方括号替换成当前项目、集数、段落或具体要求即可。

网页版入口：安装后运行 `scripts/build_user_manual_browser.py`，打开当前 skill 文件夹中的 `references/user-manual-browser.html`。Windows 通常位于 `C:\Users\[用户名]\.codex\skills\ai-comic-drama\references\user-manual-browser.html`，Mac 通常位于 `/Users/[用户名]/.codex/skills/ai-comic-drama/references/user-manual-browser.html`；以本机实际绝对路径为准。

核心原则：

- 先说清楚范围：项目、季/集、段落、是否只做素材。
- 视频提交要单独确认：批量生产、关键帧、音频、上传包都不等于提交视频。
- 关键帧验收只验收图片：脚本和提示词只是参考材料。
- 后续段落必须等上一段通过尾帧：raw 720p 尾帧不能直接接链，下载后先 Seedan 1080p，再 60fps，再抽尾帧。
- 如果你说“继续”，默认继续当前已记录路线；如果你说“重新生成”，必须说明是关键帧、音频、上传包还是视频。

## 瘦身版使用方式

`SKILL.md` 现在只负责硬门禁和路由，不再装下全部制片细则。你推进任务时，不需要一次性把所有规则重复一遍，只要说清楚“范围 + 目标 + 边界”，skill 会按阶段加载对应手册。

推荐说法：

```text
Use $ai-comic-drama 按瘦身版路由推进《[项目名]》[范围]：[目标]。只加载当前阶段需要的reference，先读当前运行设置和相关生产包；不要做与本目标无关的生成或提交。
```

如果你希望它更省上下文，可以直接点名阶段：

| 你要推进 | 推荐补充 |
|---|---|
| 剧情/分镜 | `只按剧情和15秒分镜阶段处理，不读视频提交手册。` |
| 关键帧 | `只处理关键帧、imagegen staging 和有序关键帧表，不提交视频。` |
| Mimo音频 | `只处理Mimo音频映射和上传副本，不改关键帧。` |
| 上传包 | `只构建上传包和视频提示词，不提交视频。` |
| 视频提交 | `只通过即梦CLI提交这个SEG，提交前重新检查硬门禁。` |
| 成片后处理 | `只处理Seedan 1080p/60fps、归档和尾帧，不重提视频。` |
| 批量生产 | `只做批量素材和待提交清单，不提交、不排队、不下载。` |

当你发现 skill 开始读太多东西，可以这样收束：

```text
Use $ai-comic-drama 收束到当前任务：只处理《[项目名]》[范围] 的 [阶段]，不要加载无关reference，不要改无关文件。
```

## Reference 路由速查

一般不要主动点名历史兼容路由；需要更稳定时，直接按阶段点名下面的 reference：

| 你要做什么 | 推荐点名 |
|---|---|
| 生图任务、source record、项目本地 `imagegen_staging/` | `只加载 imagegen-staging.md` |
| 干净场景参考、道具/线索参考、有序关键帧上传表 | `只加载 asset-package-tables.md` |
| 关键帧审片网页、PASS/RETAKE、返修备注、批量验收结果 | `优先同时使用 $keyframe-review-gallery；不可用时运行 scripts/build_keyframe_review_gallery.py` |
| 角色音色、Mimo对白、补静音上传副本、音频映射 | `只加载 mimo-audio-handoff.md` |
| 上传包、视频提示词、即梦CLI提交、7图软上限/9图硬上限、Seedan后处理、尾帧交接 | `只加载 seedance-2-handoff.md` |
| 成片验收、返修、最终交付、批量质检 | `只加载 quality-gates.md 和 delivery-qc-templates.md` |
| 检查 skill 自身路由、缺文件、长文档目录 | `运行 scripts/check_skill_integrity.py` |

## 一句话推进法

### 盘点当前状态

```text
Use $ai-comic-drama 盘点《[项目名]》当前进度：读取当前运行设置、当前生产包和最近一次提交记录，告诉我每个段落的状态、阻塞点、下一步建议。不要生成新素材，不要提交视频。
```

### 按阶段精简推进

```text
Use $ai-comic-drama 按瘦身版路由推进《[项目名]》[SXXEXX_SEGXXX] 的 [阶段名]。只加载这个阶段需要的reference，输出已完成、阻塞点和下一步；不要生成或提交超出本阶段的内容。
```

### 继续当前段落素材

```text
Use $ai-comic-drama 继续推进《[项目名]》[SXXEXX_SEGXXX] 的素材准备，按阶段输出：1)脚本/分镜同步；2)参考资产与 imagegen staging/source record 缺口；3)Mimo音频；4)有序关键帧上传规划；5)上传包/manifest。只推进当前缺口阶段，不提交Seedance视频。
```

### 只整理，不生成

```text
Use $ai-comic-drama 只整理《[项目名]》[范围] 的生产状态：清理废案引用、更新manifest和上传清单、列出缺口。不要调用imagegen、Mimo，也不要提交Seedance视频。
```

### 继续后续全部素材

```text
Use $ai-comic-drama 从《[项目名]》[起始段落] 开始继续后续素材，直到 [结束范围]。只做批量素材：分镜、关键帧提示词、Mimo音频、上传包、检查报告；不提交视频、不排队、不下载、不抽尾帧。
```

## 项目启动

### 从原始资料建项目

```text
Use $ai-comic-drama 以我提供的小说、大纲、人物参考图、场景图、风格图和音频为准，建立《[项目名]》当前运行设置、素材整合清单、锁定资产缺口表和第一集制作路线。先不要生成图片或视频。
```

### 确认正式路线

```text
Use $ai-comic-drama 为《[项目名]》建立正式路线：每集约 [时长] 分钟，每段15秒、固定4镜头/4帧；所有图片/关键帧/返修图必须走 $imagegen built-in image_gen；关键帧走 ordered keyframes；视频走 Seedance `seedance2.0`；视频上传/查询/下载必须通过本地即梦 dreamina CLI；下载后 Seedan 1080p 再 60fps。输出当前运行设置和待确认事项。
```

### 大规模生产前检查

```text
Use $ai-comic-drama 检查《[项目名]》是否可以进入批量生产：小说/集纲、角色锁、干净场景参考、道具/线索、Mimo音色、黄金样片、连续性测试、成本策略。输出 PASS/WARN/BLOCKED 清单。
```

## 剧情和分镜

### 拆第一集

```text
Use $ai-comic-drama 把《[项目名]》[第X集] 拆成约 [数量] 个15秒单元，每段固定4个SHOT，保留短剧压力、转折和结尾钩子。输出分段表和每段剧情功能，不生成图片。
```

### 重写指定段

```text
Use $ai-comic-drama 重写《[项目名]》[SXXEXX_SEGXXX] 的15秒分镜。要求：承接上一段状态；固定4个连续SHOT；每个SHOT写清景别/机位、画面动作、角色表演、音频口型、参考资产、画面禁区和连续性要求。不要生成图片。
```

### 检查分镜质量

```text
Use $ai-comic-drama 检查《[项目名]》[范围] 的分镜是否满足：每段15秒、固定4镜头、SHOT01-SHOT04连续、动作具体、表演可见、没有占位词、没有文字/UI风险、结尾可承接。只输出问题和修改建议。
```

## 参考资产

### 建角色锁

```text
Use $ai-comic-drama 为《[项目名]》整理角色锁：[角色名单]。基于现有参考图，写出脸型、发型、体态、服装、标志道具、允许变化和禁止漂移；列出缺失参考图。不要生成新图，除非我确认。
```

### 建场景空间锚点

```text
Use $ai-comic-drama 为《[项目名]》[场景名] 准备干净场景参考需求：说明入口出口、路线、层级、灯光区、材质和禁止内容；如需空间源图可另存审计，但正式上传图必须是干净单图，不是九宫格、地图或拼贴。先写生成提示词和锁定标准，不提交视频。
```

### 检查道具/线索缺口

```text
Use $ai-comic-drama 检查《[项目名]》[范围] 的可见道具和追踪线索：哪些必须有纯道具参考或线索参考，哪些已有锁定图，哪些会阻塞正式关键帧或视频提交。输出补齐优先级。
```

## 关键帧

### 生成关键帧提示词

```text
Use $ai-comic-drama 为《[项目名]》[SXXEXX_SEGXXX] 生成关键帧提示词。后续段落的 SHOT01 使用上一段真实尾帧，只为 SHOT02 到最后一个SHOT 写提示词。每个提示词必须是单张16:9电影画面，包含实际加载参考图清单要求，不要写成本地路径可自动绑定。
```

### 生成关键帧候选

```text
Use $ai-comic-drama 为《[项目名]》[SXXEXX_SEGXXX] 生成 SHOT[范围] 关键帧候选。必须使用 $imagegen built-in image_gen；生成前先确认并加载本镜头所需角色、场景、道具、异兽/线索参考；生成后写入项目本地 imagegen_staging source record，工具记录为 `$imagegen_builtin_image_gen`，再复制到 keyframes。不要提交视频。
```

### 只做 imagegen staging 记录

```text
Use $ai-comic-drama 为《[项目名]》[范围] 只整理 imagegen staging/source record：核对工具为 `$imagegen_builtin_image_gen`、默认输出路径、项目本地 staging 路径、最终保存路径、哈希、实际加载参考图清单和验收状态。不要生成新图，不提交视频。
```

### 做关键帧验收页

```text
Use $ai-comic-drama 为《[项目名]》[范围] 制作关键帧验收网页。优先使用 $keyframe-review-gallery；如果不可用，运行 `scripts/build_keyframe_review_gallery.py`。输入使用当前关键帧manifest或图片清单；只展示待用户验收的关键帧图片，旁边只显示镜头、画面动作、角色/表演三类简短参考；生成 index.html、status_reader.html、KEYFRAME_REVIEW_STATE.json 和确认模板。标明 PASS/RETAKE/PENDING，不提交视频。
```

  <script>
    const source = document.getElementById("manualSource").value.replace(/\r\n/g, "\n");
    const content = document.getElementById("content");
    const toc = document.getElementById("toc");
    const searchInput = document.getElementById("searchInput");
    const emptyState = document.getElementById("emptyState");

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function inlineFormat(value) {
      return escapeHtml(value).replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function slugFor(title, index) {
      const ascii = title
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return ascii || `section-${index}`;
    }

    function parseTable(lines) {
      const rows = lines
        .map(line => line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(cell => cell.trim()))
        .filter(row => row.length > 1);
      if (rows.length < 2) return "";
      const header = rows[0];
      const body = rows.slice(2);
      return `<div class="table-wrap"><table><thead><tr>${header.map(cell => `<th>${inlineFormat(cell)}</th>`).join("")}</tr></thead><tbody>${body.map(row => `<tr>${row.map(cell => `<td>${inlineFormat(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split("\n");
      let html = "";
      let index = 0;
      let sectionOpen = false;
      let sectionIndex = 0;

      function openSection(title) {
        if (sectionOpen) html += "</section>";
        const id = slugFor(title, sectionIndex++);
        html += `<section class="manual-section" id="${id}" data-title="${escapeHtml(title)}"><h2>${inlineFormat(title)}</h2>`;
        sectionOpen = true;
      }

      while (index < lines.length) {
        const line = lines[index];
        const trimmed = line.trim();

        if (!trimmed) {
          index++;
          continue;
        }

        if (trimmed.startsWith("# ")) {
          const title = trimmed.replace(/^#\s+/, "");
          html += `<header class="hero"><h1>${inlineFormat(title)}</h1>`;
          index++;
          const intro = [];
          while (index < lines.length && !lines[index].startsWith("## ")) {
            if (lines[index].trim()) intro.push(lines[index].trim());
            index++;
          }
          if (intro.length) html += `<p>${inlineFormat(intro.join(" "))}</p>`;
          html += `<div class="stats" id="stats"></div></header>`;
          continue;
        }

        if (trimmed.startsWith("## ")) {
          openSection(trimmed.replace(/^##\s+/, ""));
          index++;
          continue;
        }

        if (trimmed.startsWith("### ")) {
          if (!sectionOpen) openSection("快速开始");
          html += `<h3>${inlineFormat(trimmed.replace(/^###\s+/, ""))}</h3>`;
          index++;
          continue;
        }

        if (trimmed.startsWith("```")) {
          const lang = trimmed.replace(/^```/, "").trim();
          index++;
          const code = [];
          while (index < lines.length && !lines[index].trim().startsWith("```")) {
            code.push(lines[index]);
            index++;
          }
          index++;
          if (!sectionOpen) openSection("提示词");
          html += `<div class="prompt" data-lang="${escapeHtml(lang)}"><button class="copy-button" type="button">复制</button><pre><code>${escapeHtml(code.join("\n"))}</code></pre></div>`;
          continue;
        }

        if (trimmed.startsWith("|") && index + 1 < lines.length && /^\|?\s*:?-{3,}/.test(lines[index + 1].trim())) {
          const tableLines = [];
          while (index < lines.length && lines[index].trim().startsWith("|")) {
            tableLines.push(lines[index]);
            index++;
          }
          if (!sectionOpen) openSection("表格");
          html += parseTable(tableLines);
          continue;
        }

        if (trimmed.startsWith("- ")) {
          const items = [];
          while (index < lines.length && lines[index].trim().startsWith("- ")) {
            items.push(lines[index].trim().replace(/^-\s+/, ""));
            index++;
          }
          if (!sectionOpen) openSection("要点");
          html += `<ul>${items.map(item => `<li>${inlineFormat(item)}</li>`).join("")}</ul>`;
          continue;
        }

        const paragraph = [];
        while (
          index < lines.length &&
          lines[index].trim() &&
          !lines[index].startsWith("#") &&
          !lines[index].trim().startsWith("- ") &&
          !lines[index].trim().startsWith("|") &&
          !lines[index].trim().startsWith("```")
        ) {
          paragraph.push(lines[index].trim());
          index++;
        }
        if (!sectionOpen) openSection("说明");
        html += `<p>${inlineFormat(paragraph.join(" "))}</p>`;
      }

      if (sectionOpen) html += "</section>";
      return html;
    }

    function setupToc() {
      toc.innerHTML = "";
      document.querySelectorAll(".manual-section").forEach(section => {
        const title = section.dataset.title || section.querySelector("h2")?.textContent || "";
        const item = document.createElement("li");
        const link = document.createElement("a");
        link.href = `#${section.id}`;
        link.textContent = title;
        item.appendChild(link);
        toc.appendChild(item);
      });
    }

    function setupCopyButtons() {
      document.querySelectorAll(".copy-button").forEach(button => {
        button.addEventListener("click", async () => {
          const code = button.nextElementSibling?.innerText || "";
          try {
            await navigator.clipboard.writeText(code);
            button.textContent = "已复制";
          } catch {
            const holder = document.createElement("textarea");
            holder.value = code;
            document.body.appendChild(holder);
            holder.select();
            document.execCommand("copy");
            holder.remove();
            button.textContent = "已复制";
          }
          window.setTimeout(() => (button.textContent = "复制"), 1200);
        });
      });
    }

    function setupSearch() {
      searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim().toLowerCase();
        let visible = 0;
        document.querySelectorAll(".manual-section").forEach(section => {
          const hit = !query || section.textContent.toLowerCase().includes(query);
          section.hidden = !hit;
          if (hit) visible++;
        });
        emptyState.hidden = visible !== 0;
      });
    }

    function setupStats() {
      const stats = document.getElementById("stats");
      const sectionCount = document.querySelectorAll(".manual-section").length;
      const promptCount = document.querySelectorAll(".prompt").length;
      const tableCount = document.querySelectorAll("table").length;
      stats.innerHTML = `
        <span class="chip">${sectionCount} 个章节</span>
        <span class="chip">${promptCount} 条可复制提示词</span>
        <span class="chip">${tableCount} 张速查表</span>
      `;
    }

    content.innerHTML = renderMarkdown(source);
    setupToc();
    setupCopyButtons();
    setupSearch();
    setupStats();
  </script>
</body>
</html>
